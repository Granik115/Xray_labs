name: Build and publish Windows release

"on":
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: xray-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content constants.py -Raw
          $match = [regex]::Match($content, 'APP_VERSION\s*=\s*"([0-9]+\.[0-9]+\.[0-9]+)"')
          if (-not $match.Success) { throw "APP_VERSION not found" }
          $version = $match.Groups[1].Value
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=v$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Skip an existing release
        id: existing
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          REPOSITORY: ${{ github.repository }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }
          $uri = "https://api.github.com/repos/$env:REPOSITORY/releases/tags/$env:TAG"
          $response = Invoke-WebRequest -Uri $uri -Headers $headers -SkipHttpErrorCheck
          if ($response.StatusCode -eq 200) {
            "exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } elseif ($response.StatusCode -eq 404) {
            "exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            throw "GitHub API returned HTTP $($response.StatusCode)"
          }

      - name: Install build dependencies
        if: steps.existing.outputs.exists != 'true'
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          choco install innosetup --no-progress -y

      - name: Test
        if: steps.existing.outputs.exists != 'true'
        shell: pwsh
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Build installer and portable packages
        if: steps.existing.outputs.exists != 'true'
        shell: pwsh
        run: ./build.ps1

      - name: Create checksums
        if: steps.existing.outputs.exists != 'true'
        shell: pwsh
        run: |
          $files = Get-ChildItem releases -File | Where-Object { $_.Extension -in '.exe', '.zip' }
          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash $file.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($file.Name)"
          }
          $lines | Set-Content releases/SHA256SUMS.txt -Encoding ascii

      - name: Tag and publish release
        if: steps.existing.outputs.exists != 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $env:TAG -m "X-Ray-lab $env:TAG"
          git push origin $env:TAG
          $notes = @"
          ## X-Ray-lab $env:TAG

          - Исправлено распознавание настоящих вкраплений рядом с рамкой контейнера.
          - Добавлена проверка, что полувысотная область точки не касается самой рамки.
          - Добавлено радиальное падение контраста для исключения линейных краёв контейнера.
          - Ужесточена проверка характерного диаметра: слишком мелкие шумовые точки отбрасываются.
          "@
          gh release create $env:TAG `
            "releases/Xray_labs-$env:VERSION-setup.exe" `
            "releases/Xray_labs-v$env:VERSION-portable.zip" `
            "releases/Xray_labs-portable.zip" `
            "releases/SHA256SUMS.txt" `
            --title "X-Ray-lab $env:TAG" `
            --notes $notes
